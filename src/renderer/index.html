<!doctype html><html lang='es'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>ProxyBrowser Pro</title><script src='https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4'></script></head>
<body class='bg-slate-950 text-slate-100 h-screen overflow-hidden'>
<div class='flex h-full'>
<aside class='w-64 bg-slate-900 border-r border-slate-800 p-4 flex flex-col justify-between'><div><h1 class='text-xl font-bold mb-6'>🛡 ProxyBrowser Pro</h1><div class='space-y-2 text-slate-300'><div class='p-2 rounded bg-blue-900'>Navegador</div><div class='p-2'>Proxies</div><div class='p-2'>Perfiles</div><div class='p-2'>Leak Test</div></div></div><div class='text-red-400 border border-red-800 rounded p-3'>Kill Switch ACTIVO</div></aside>
<main class='flex-1 flex flex-col'><header class='grid grid-cols-5 gap-2 p-3 border-b border-slate-800'><div class='bg-slate-900 rounded p-2' id='activeProxy'>Proxy activo: -</div><div class='bg-slate-900 rounded p-2' id='publicIp'>IP: -</div><div class='bg-slate-900 rounded p-2' id='location'>Ubicación: -</div><div class='bg-slate-900 rounded p-2' id='privacy'>Privacidad: -</div><button id='leakBtn' class='bg-blue-700 rounded'>Leak Test</button></header>
<div class='flex flex-1'>
<section class='flex-1 p-3'><div class='bg-slate-900 rounded-xl p-3 h-full flex flex-col'><div class='flex gap-2 mb-2'><input id='urlInput' class='flex-1 bg-slate-800 rounded p-2' placeholder='Buscar o ingresar dirección web'><button id='goBtn' class='bg-blue-600 px-3 rounded'>Ir</button><button id='clearBtn' class='bg-red-700 px-3 rounded'>Limpiar perfil</button></div><iframe id='browserFrame' class='w-full flex-1 rounded bg-white'></iframe></div></section>
<aside class='w-[430px] p-3 space-y-3'><div class='bg-slate-900 rounded-xl p-3'><div class='flex gap-2 mb-2'><button id='importBtn' class='bg-blue-600 px-3 py-1 rounded'>Agregar</button><button id='retestBtn' class='bg-slate-700 px-3 py-1 rounded'>Probar todos</button></div><div id='proxyList' class='space-y-2 max-h-[360px] overflow-auto'></div></div><div class='bg-slate-900 rounded-xl p-3'><h3 class='font-semibold'>LEAK TEST</h3><div id='leakStatus' class='text-emerald-400'>Seguro</div><div id='leakDetails' class='text-xs text-slate-300'></div></div></aside>
</div>
<footer class='grid grid-cols-4 p-3 border-t border-slate-800 text-sm'><div id='killStatus'>Kill Switch: ACTIVO</div><div>Proxy obligatorio: ACTIVO</div><div><label>Modo privacidad <input id='privacyToggle' type='checkbox' checked></label></div><div id='trafficStatus'>Bloqueado</div></footer>
</main></div><script src='./renderer.js'></script></body></html>
