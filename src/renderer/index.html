<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navega Proxy Browser</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="h-screen bg-slate-900 text-slate-100">
  <div class="flex h-full">
    <aside class="w-96 border-r border-slate-700 p-4 space-y-3 overflow-auto">
      <h1 class="text-xl font-bold">Navega Proxy Browser</h1>
      <button id="importBtn" class="w-full bg-blue-600 rounded px-3 py-2">Importar proxies</button>
      <button id="retestBtn" class="w-full bg-emerald-600 rounded px-3 py-2">Re-probar todos</button>
      <select id="sortSelect" class="w-full text-black rounded px-2 py-2">
        <option value="latency">Ordenar por latencia</option>
        <option value="location">Ordenar por país</option>
        <option value="status">Ordenar por estado</option>
      </select>
      <div id="proxyList" class="space-y-2"></div>
    </aside>
    <main class="flex-1 flex flex-col">
      <div class="p-2 border-b border-slate-700 flex gap-2 items-center">
        <button data-cmd="back" class="nav bg-slate-700 px-3 py-1 rounded">◀</button>
        <button data-cmd="forward" class="nav bg-slate-700 px-3 py-1 rounded">▶</button>
        <button data-cmd="reload" class="nav bg-slate-700 px-3 py-1 rounded">⟳</button>
        <button id="homeBtn" class="bg-slate-700 px-3 py-1 rounded">🏠</button>
        <input id="urlInput" class="flex-1 text-black rounded px-3 py-1" value="https://example.com" />
        <button id="goBtn" class="bg-blue-600 px-3 py-1 rounded">Ir</button>
        <button id="clearBtn" class="bg-red-700 px-3 py-1 rounded">Limpiar datos</button>
      </div>
      <div class="px-3 py-2 text-sm border-b border-slate-700" id="statusBar"></div>
      <iframe id="browserFrame" class="flex-1 w-full bg-white"></iframe>
    </main>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
